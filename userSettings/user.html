<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>futureGoal</title>

    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="user.css">
</head>
<body>
    <div class="container">

        <div class="controlDiv">
            <div class="controlButtons">
                <a href="">X</a>
                <a href="">O</a>
                <a href="" class="minimize">-</a>
            </div>

            <h2 class="controlTitle">futureGoal</h2>
        </div>

        <header class="globalHeader">
            <div class="globalheaderDiv">
                <h1 class="mainTitle">user settings</h1>

                <div class="globalButtons">
                    <a href="../listsPage/lists.html"><img src="images/listImg.png" alt="" width="47px" class="listButton"></a>
                    <a href="../userSettings/user.html"><img src="images/userImg.png" alt="" width="35px" height="35px" class="userButton"></a>
                </div>
            </div>
        </header>

        <section>

            <div>
                <img src="images/profilePic.png" alt="">

                <div>
                    <div id="email_Holder" class="input">
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" required>
                    </div>

                    <div id="username_Holder" class="input">
                        <label for="username">Username</label>
                        <input type="text" name="username" id="username" required>
                    </div>

                    <div id="password_Holder" class="input">
                        <label for="password">Password</label>
                        <input type="password" name="password" id="password" placeholder="********" required>
                    </div>
                </div>

                <div>
                    <h3>DANGER ZONE</h3>
                    <span>Delete account</span>
                    <p>*note that this action is IRREVERSABLE and CANNOT be undone.*</p>
                </div>

            </div>

        </section>

    </div>
